<!DOCTYPE html>

<html>

<head>
    <!-- Set character encoding to UTF-8 for proper text display -->
    <meta charset="UTF-8">
    <!-- Page title that appears in browser tab -->
    <title>Chart</title>
    <!-- Link to favicon icon -->
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <!-- Ensure responsive design on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link to external CSS stylesheet for styling (relative path to repository root) -->
    <link rel="stylesheet" href="index.css" />
</head>

<body translate="no">

    <!-- Main page container wrapper -->
    <div class="page-container">
        <!-- Dashboard container for all visualizations -->
        <div class="dashboard-container">
            <!-- Top Row: Two containers side by side -->
            <div class="top-row">
                <!-- Container for first chart (bar chart) -->
                <div class="chart-container" id="container-1">
                    <!-- Title for chart 1 -->
                    <h2 class="chart-title">Weekly Study Time vs Average Math Grade</h2>
                    <!-- Content area where chart 1 will be rendered -->
                    <div class="chart-content" id="chart-1"></div>
                </div>
                <!-- Container for second chart (scatterplot) -->
                <div class="chart-container" id="container-2">
                    <!-- Title for chart 2 -->
                    <h2 class="chart-title">Number of School Absences vs Math Final Grade</h2>
                    <!-- Content area where chart 2 will be rendered -->
                    <div class="chart-content" id="chart-2"></div>
                </div>
            </div>
            <!-- Bottom Row: One full-width container -->
            <div class="bottom-row">
                <!-- Container for third chart (parallel coordinates) -->
                <div class="chart-container" id="container-3">
                    <!-- Title for chart 3 -->
                    <h2 class="chart-title">Behavioral Patterns by Alcohol Consumption</h2>
                    <!-- Content area where chart 3 will be rendered -->
                    <div class="chart-content" id="chart-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Load D3.js library (v7) from a CDN for browser retrieval -->
    <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
    <!-- Load the single consolidated application script that contains chart classes and initialization -->
    <script src="main.js"></script>

</body>

</html>
